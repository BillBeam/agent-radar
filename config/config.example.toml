# Copy to ../config.toml (gitignored) and fill in. All fields optional — defaults shown.
# The agent edits this file in conversation when you ask it to (Face 2 self-iteration).

timezone = "Asia/Shanghai"
daily_max_items = 10
weekly_max_items = 25
freshness_hours = 48.0          # daily window; dedup makes a generous window safe (per-source override via sources.yaml max_age_hours)
weekly_freshness_hours = 192.0  # weekly: ~8 days
relevance_threshold = 6.0       # triage score below this is dropped (宁缺毋滥)
deepread_top_k = 6              # how many top items get a full 中文详解
token_budget_per_run = 200000

# === 代理（一等公民）===
# 多数信息源是西方站点，国内通常需要代理。解析顺序：
#   1. 下面显式 http_proxy（若设置，优先、并忽略环境变量代理）
#   2. 否则尊重环境变量 HTTPS_PROXY / HTTP_PROXY / ALL_PROXY（use_env_proxy=true，默认）
#   3. use_env_proxy=false 则强制直连
# 跑 `python -m radar --mode doctor` 会经解析后的代理实测各源可达性。
use_env_proxy = true
# http_proxy = "http://127.0.0.1:7890"   # 显式覆盖；设了它就忽略环境变量代理

[models]            # claude -p model tier per stage (controls subscription quota)
triage = "haiku"
deepread = "sonnet"
synthesize = "sonnet"

[channels]
local = true        # always-on markdown archive under data/digests/
macos = true        # desktop notification when a digest is ready

# Paste your DingTalk custom-robot webhook here to enable phone push.
# Create: DingTalk group → 群设置 → 智能群助手 → 添加机器人 → 自定义 → 安全设置=加签.
# [channels.dingtalk]
# webhook = "https://oapi.dingtalk.com/robot/send?access_token=XXXX"
# secret  = "SECxxxx"   # the 加签 secret (recommended security mode)

# 投票卡（互动卡片，👍/👎 → serve 写回 feedback）。空段即启用——凭证只从 env 读、
# 绝不写这里：DINGTALK_CLIENT_ID / SECRET / ROBOT_CODE / CARD_TEMPLATE_ID / USER_ID（见 .env）。
# [channels.dingtalk_card]
